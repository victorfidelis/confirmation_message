<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-mail Confirmado</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #FEFEFE;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 600px;
      background-color: #FEFEFE;
      border: 1px solid rgba(139,152,161,0.3);
      border-radius: 8px;
      overflow: hidden;
    }

    .header {
      padding: 30px;
      text-align: center;
      border-bottom: 1px solid rgba(139,152,161,0.3);
    }

    .content {
      padding: 30px;
      color: #0E293C;
      text-align: center;
    }

    .success-icon {
      font-size: 50px;
      color: #3CB5FF;
      margin-bottom: 20px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin: 0 0 10px 0;
    }

    .text {
      margin: 10px 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
    }

    img {
      max-width: 180px;
      height: auto;
    }
  </style>

</head>

<body>

  <div class="container">

    <div class="card">

      <div class="header">
        <img src="https://gpsxcsnzlumlcdokninp.supabase.co/storage/v1/object/public/images/vfdev/logo/dark_logo.png"
             alt="Logo da empresa">
      </div>

      <div class="content">

        <div class="success-icon">✓</div>

        <p class="title">E-mail confirmado com sucesso!</p>

        <p class="text">
          Seu endereço de e-mail foi verificado com sucesso.
        </p>

        <p class="text">
          Agora você já pode acessar todas as funcionalidades do App Prestador de Serviço.
        </p>

        <div class="footer">
          Atenciosamente,<br>
          VF Develop
        </div>

      </div>

    </div>

  </div>

</body>
</html>
